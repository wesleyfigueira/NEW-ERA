<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AbleVu AI Assistant</title>

<style>
:root {
    --primary-color: #2c3e50;
    --accent-color: #3498db;
    --bg-color: #f4f7f6;
    --white: #ffffff;
}

body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background-color: var(--bg-color);
    margin: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

#chat-container {
    width: 420px;
    height: 650px;
    background: var(--white);
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    border-radius: 18px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
}

header {
    background: var(--primary-color);
    color: var(--white);
    padding: 20px;
    text-align: center;
    font-weight: bold;
    font-size: 1.2rem;
}

#chat-box {
    flex: 1;
    padding: 20px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 12px;
}

/* Base Message */
.message {
    max-width: 85%;
    padding: 12px 16px;
    border-radius: 18px;
    line-height: 1.6;
    font-size: 0.95rem;
    animation: fadeIn 0.2s ease-in-out;
}

/* User Message */
.user {
    align-self: flex-end;
    background-color: var(--accent-color);
    color: white;
    border-bottom-right-radius: 4px;
}

/* Bot Message */
.bot {
    align-self: flex-start;
    background-color: #f1f3f5;
    color: var(--primary-color);
    border-bottom-left-radius: 4px;
    white-space: pre-wrap;
    word-wrap: break-word;
}

/* Bot formatted text */
.bot p {
    margin: 0 0 10px 0;
}

.bot ul {
    padding-left: 18px;
    margin: 8px 0;
}

.bot li {
    margin-bottom: 6px;
}

/* Input Area */
.input-area {
    border-top: 1px solid #eee;
    padding: 18px;
    display: flex;
    gap: 10px;
}

input {
    flex: 1;
    border: 1px solid #ddd;
    padding: 12px;
    border-radius: 25px;
    outline: none;
    transition: border 0.3s;
    font-size: 0.95rem;
}

input:focus {
    border-color: var(--accent-color);
}

button {
    background: var(--accent-color);
    color: white;
    border: none;
    padding: 10px 18px;
    border-radius: 25px;
    cursor: pointer;
    font-weight: bold;
    transition: opacity 0.3s;
}

button:hover {
    opacity: 0.85;
}

/* Animation */
@keyframes fadeIn {
    from { opacity: 0; transform: translateY(5px); }
    to { opacity: 1; transform: translateY(0); }
}
</style>
</head>

<body>

<div id="chat-container">
    <header>AbleVu AI Assistant</header>

    <div id="chat-box">
        <div class="message bot">
            Hello! I'm the AbleVu Assistant.  
            How can I help you today with accessibility information or partnership details?
        </div>
    </div>

    <div class="input-area">
        <input type="text"
               id="user-input"
               placeholder="Ask about accessibility..."
               onkeypress="handleKeyPress(event)">
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<script>

function handleKeyPress(e) {
    if (e.key === 'Enter') sendMessage();
}

function formatBotMessage(text) {
    // Escape HTML (security)
    const escaped = text
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");

    // Convert paragraphs
    const paragraphs = escaped
        .split("\n\n")
        .map(p => `<p>${p.replace(/\n/g, "<br>")}</p>`);

    return paragraphs.join("");
}

async function sendMessage() {
    const input = document.getElementById('user-input');
    const chatBox = document.getElementById('chat-box');
    const message = input.value.trim();

    if (!message) return;

    // Add user message
    chatBox.innerHTML += `<div class="message user">${message}</div>`;
    input.value = '';
    chatBox.scrollTop = chatBox.scrollHeight;

    try {
        const response = await fetch('/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ message: message })
        });

        const data = await response.json();

        if (data.response) {
            const formatted = formatBotMessage(data.response);
            chatBox.innerHTML += `<div class="message bot">${formatted}</div>`;
        } else {
            chatBox.innerHTML += `<div class="message bot"><i>Error processing response.</i></div>`;
        }

    } catch (error) {
        chatBox.innerHTML += `<div class="message bot"><i>Connection error with the server.</i></div>`;
    }

    chatBox.scrollTop = chatBox.scrollHeight;
}

</script>

</body>
</html>
